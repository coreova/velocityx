name: Documentation issue
description: Report unclear, missing, or outdated VelocityX docs.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Location
      placeholder: "README.md, PRIVACY_POLICY.md, options help, etc."
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should be improved?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or direction
