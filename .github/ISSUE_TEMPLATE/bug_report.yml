name: Bug report
description: Report a reproducible VelocityX problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve VelocityX. Please include enough detail for maintainers to reproduce the issue.
  - type: input
    id: version
    attributes:
      label: VelocityX version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "Chrome 124 on Windows 11"
    validations:
      required: true
  - type: input
    id: site
    attributes:
      label: Affected site or media type
      placeholder: "youtube.com, local file, HTML5 video page"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. Observe..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, logs, or notes
      description: Do not include private data, tokens, or security exploit details.
